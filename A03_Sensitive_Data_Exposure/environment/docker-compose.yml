services:
  mysql:
    image: mysql:5.7
    container_name: a03_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: owasp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: a03_web
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLASK_APP: app.py
      FLASK_RUN_HOST: 0.0.0.0
    volumes:
      - ./app:/app

volumes:
  db_data: